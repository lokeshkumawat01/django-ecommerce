<header class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-gray-200">

<div class="max-w-7xl mx-auto px-6">

    <!-- Main Row -->
    <div class="flex items-center justify-between py-3">

        <!-- Logo -->
        <a href="/" class="text-2xl font-bold text-blue-600 hover:scale-105 transition duration-300">
            MyShop
        </a>

        <!-- Search -->
        <div class="hidden md:flex flex-1 mx-6 relative">
            <form method="GET" action="/" class="w-full">
                <div class="relative">
                    <input 
                        type="text" 
                        name="q"
                        id="searchInput"
                        placeholder="Search for products..."
                        autocomplete="off"
                        class="w-full pl-11 pr-4 py-2.5 rounded-full border border-gray-300 bg-white shadow-sm
                               focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent
                               transition duration-300"
                        onkeyup="showSuggestions()"
                    >

                    <!-- Icon -->
                    <span class="absolute left-3 top-2.5 text-gray-400 text-lg">🔍</span>
                </div>
            </form>

            <!-- Dropdown -->
            <div id="searchDropdown" 
                class="absolute top-full left-0 w-full bg-white mt-1 rounded-xl shadow-xl border border-gray-200 
                       opacity-0 invisible transition-all duration-300 overflow-hidden">

                <ul id="suggestionsList" class="text-sm">

                    <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer transition">iPhone</li>
                    <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer transition">Shoes</li>
                    <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer transition">Laptop</li>
                    <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer transition">Headphones</li>

                </ul>
            </div>
        </div>

        <!-- Right Section -->
        <div class="flex items-center gap-5">

            <!-- Profile -->
            <a href="{% url 'profile' %}" class="text-xl hover:scale-110 transition duration-300">👤</a>

            <!-- Cart -->
            <a href="{% url 'cart_overview' %}" class="relative group">
                <span class="text-xl group-hover:scale-110 transition">🛒</span>

                <span id="cart-qty" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">
                    {{ cart|length|default:0 }}
                </span>
            </a>

            <!-- Auth -->
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" 
                   class="hidden md:block bg-red-600 text-sm font-medium text-white hover:bg-red-700 py-1.5 px-4 rounded-lg transition">
                   Logout
                </a>
            {% else %}
                <a href="{% url 'login' %}" 
                   class="hidden md:block bg-blue-600 text-white px-4 py-1.5 rounded-lg hover:bg-blue-700 transition">
                   Login
                </a>
            {% endif %}

            <!-- Mobile Menu Button -->
            <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>

        </div>
    </div>

    <!-- Categories -->
    <div class="hidden md:flex gap-6 py-2 text-sm font-medium text-gray-600">
        <a href="#" class="hover:text-blue-600 transition">Electronics</a>
        <a href="#" class="hover:text-blue-600 transition">Fashion</a>
        <a href="#" class="hover:text-blue-600 transition">Home</a>
        <a href="#" class="hover:text-blue-600 transition">Beauty</a>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden flex flex-col gap-3 py-4 border-t">

        <input type="text" placeholder="Search..."
               class="border px-3 py-2 rounded-lg focus:ring-2 focus:ring-blue-400">

        <a href="#" class="hover:text-blue-600">Electronics</a>
        <a href="#" class="hover:text-blue-600">Fashion</a>
        <a href="#" class="hover:text-blue-600">Home</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="text-red-600 ">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="text-blue-600">Login</a>
        {% endif %}

    </div>

</div>
</header>

<script>
function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('hidden');
}

function showSuggestions() {
    let input = document.getElementById("searchInput");
    let dropdown = document.getElementById("searchDropdown");

    if (input.value.length > 0) {
        dropdown.classList.remove("invisible");
        dropdown.classList.add("opacity-100");
    } else {
        dropdown.classList.add("invisible");
        dropdown.classList.remove("opacity-100");
    }
}

// click outside close
document.addEventListener("click", function(e) {
    let input = document.getElementById("searchInput");
    let dropdown = document.getElementById("searchDropdown");

    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add("invisible");
        dropdown.classList.remove("opacity-100");
    }
});
</script>
