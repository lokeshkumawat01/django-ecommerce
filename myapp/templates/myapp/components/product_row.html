<div class="max-w-7xl mx-auto px-4 md:px-6 py-6" data-aos="fade-up">

    <!-- Section Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl md:text-2xl font-bold">Today's Deals</h1>
        <a href="#" class="text-blue-600 text-sm hover:underline">View all</a>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        
        {% for product in products %}
        <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition duration-300 overflow-hidden">

            <!-- Image -->
            <div class="overflow-hidden">
                <img 
                    src="{{ product.image.url }}" 
                    class="w-full h-48 sm:h-56 object-cover hover:scale-105 transition duration-300"
                    alt="product_image"
                >
            </div>

            <!-- Content -->
            <div class="p-4">

                <!-- Name -->
                {% if product.slug %}
                <a href="{{ product.get_absolute_url }}" 
                   class="text-base md:text-lg font-semibold hover:text-blue-600 transition">
                   {{ product.name }}
                </a>
                {% else %}
                <p class="text-base md:text-lg font-semibold">{{ product.name }}</p>
                {% endif %}

                <!-- Price -->
                <p class="text-gray-700 mt-1 font-medium">₹{{ product.price }}</p>

                <!-- Description -->
                <p class="text-sm text-gray-500 mt-2 line-clamp-2">
                    {{ product.description }}
                </p>

                <!-- Button -->
                <a href="{{ product.get_absolute_url }}"
                   class="block text-center mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                   View Product
                </a>

            </div>

        </div>
        {% empty %}
        <p class="text-gray-500 col-span-full text-center">No products available</p>
        {% endfor %}

    </div>
</div>
