<div  class="relative w-full h-[220px] md:h-[400px] overflow-hidden rounded-xl mb-8 " data-aos="fade-up" >

    <!-- Slides -->
    <div id="slider" class="flex transition-transform duration-700 ease-in-out h-full">

        <!-- Slide 1 -->
        <div class="min-w-full h-full relative">
            <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da"
                 class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white">
                <h1 class="text-2xl md:text-4xl font-bold">Big Sale 🔥</h1>
                <p class="mt-2">Up to 50% off</p>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="min-w-full h-full relative">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
                 class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white">
                <h1 class="text-2xl md:text-4xl font-bold">New Collection</h1>
                <p class="mt-2">Trending Products</p>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="min-w-full h-full relative">
            <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad"
                 class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white">
                <h1 class="text-2xl md:text-4xl font-bold">Best Deals</h1>
                <p class="mt-2">Limited Time Offer</p>
            </div>
        </div>

    </div>

    <!-- Buttons -->
    <button onclick="prevSlide()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/70 px-3 py-1 rounded-full">
        ❮
    </button>

    <button onclick="nextSlide()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/70 px-3 py-1 rounded-full">
        ❯
    </button>

</div>

<script>
let index = 0;

function showSlide() {
    const slider = document.getElementById("slider");
    slider.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide() {
    const total = document.querySelectorAll("#slider > div").length;
    index = (index + 1) % total;
    showSlide();
}

function prevSlide() {
    const total = document.querySelectorAll("#slider > div").length;
    index = (index - 1 + total) % total;
    showSlide();
}

// Auto slide
setInterval(nextSlide, 4000);
</script>
