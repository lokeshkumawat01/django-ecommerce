{% extends 'myapp/base.html' %}
{% block body %}
<div class="max-w-md mx-auto py-20 px-6 text-center" data-aos="fade-up">
    <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Check Your Inbox! 📧</h1>
    <p class="text-gray-500 mb-8">Humne aapko ek link bheja hai. Agar mail nahi mila, toh please **Spam folder** check karein.</p>
    <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Back to Login</a>
</div>
{% endblock %}
