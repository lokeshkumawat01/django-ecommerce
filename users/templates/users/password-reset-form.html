{% extends 'myapp/base.html' %}
{% block body %}
<div class="max-w-md mx-auto py-20 px-6">
    <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm" data-aos="zoom-in">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Set New Password</h1>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">
                Change Password
            </button>
        </form>
    </div>
</div>

<style>
    /* Styling Django forms automatically */
    p { margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #f9fafb; outline: none; }
    input:focus { border-color: #2563eb; background: #fff; }
</style>
{% endblock %}
