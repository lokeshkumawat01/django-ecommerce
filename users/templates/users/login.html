{% extends 'myapp/base.html' %}
{% block body %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

        <!-- Heading -->
        <h2 class="text-3xl font-bold text-center mb-2">Welcome Back 👋</h2>
        <p class="text-center text-gray-500 mb-6">Login to continue</p>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {{ form.non_field_errors }}

            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>

                {{ field }}

                {% for error in field.errors %}
                <p class="text-sm text-red-500">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}

            <!-- Button -->
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 transition">
                Login
            </button>

        </form>

        <!-- Register redirect -->
        <p class="text-sm text-center text-gray-500 mt-6">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-blue-600 hover:underline">
                Register
            </a>
        </p>

    </div>

</div>

{% endblock %}
