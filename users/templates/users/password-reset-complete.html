{% extends 'myapp/base.html' %}
{% block body %}
<div class="max-w-md mx-auto py-20 px-6 text-center" data-aos="bounce-in">
    <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Password Updated! ✅</h1>
    <p class="text-gray-500 mb-10">Aapka password successfully badal diya gaya hai. Ab aap login kar sakte hain.</p>
    <a href="{% url 'login' %}" class="inline-block bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">Login Now</a>
</div>
{% endblock %}
