{% extends 'myapp/base.html' %}
{% block body %}
<div class="max-w-md mx-auto py-20 px-6">
    <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm text-center" data-aos="zoom-in">
        
        <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-gray-900 mb-2">Reset Password</h1>
        <p class="text-gray-500 text-sm mb-8 leading-relaxed">
            Enter your email address and we'll send a link to securely reset your password.
        </p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="text-left">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">Email Address</label>
                <input type="email" name="email" required
                    class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl focus:bg-white focus:border-blue-600 focus:ring-4 focus:ring-blue-50 outline-none transition-all duration-300"
                    placeholder="Enter your registered email">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-blue-100">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-50">
            <a href="{% url 'login' %}" class="text-sm font-semibold text-blue-600 hover:text-blue-800 transition">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
