{% extends 'myapp/base.html' %}
{% block body %}
<div class="flex flex-col items-center justify-center py-20 text-center">
    <div class="bg-green-100 p-6 rounded-full mb-6 gsap-icon">
        <svg class="w-16 h-16 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1 class="text-4xl font-bold text-gray-900 mb-2 gsap-text">Order Placed Successfully! 🎉</h1>
    <p class="text-gray-500 text-lg mb-8 gsap-text">Thank you for your purchase. Your order has been received.</p>

    <div class="flex gap-4 gsap-btn">
        <a href="{% url 'index' %}" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-semibold hover:bg-gray-800 transition transform hover:-translate-y-1">
            Back to Shopping
        </a>
    </div>
</div>

<script>
    gsap.from(".gsap-icon", { scale: 0, opacity: 0, duration: 0.8, ease: "back.out(1.7)" });
    gsap.from(".gsap-text", { y: 20, opacity: 0, duration: 0.6, delay: 0.4, stagger: 0.2 });
    gsap.from(".gsap-btn", { opacity: 0, duration: 0.5, delay: 1 });
</script>
{% endblock %}
