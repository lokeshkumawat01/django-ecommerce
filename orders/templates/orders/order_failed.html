{% extends 'myapp/base.html' %}
{% block body %}

<div class="max-w-2xl mx-auto py-20 px-4 text-center">
    
    <div class="inline-flex items-center justify-center bg-red-100 p-6 rounded-full mb-8 gsap-icon">
        <svg class="w-16 h-16 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </div>

    <h1 class="text-4xl font-bold text-gray-900 mb-4 gsap-text">Oops! Order Failed ❌</h1>
    <p class="text-gray-500 text-lg mb-10 gsap-text leading-relaxed">
        Something went wrong while processing your order. <br> 
        Don't worry, no money was deducted from your account.
    </p>

    <div class="flex flex-col md:flex-row items-center justify-center gap-4 gsap-btn">
        <a href="{% url 'checkout' %}" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white px-10 py-3.5 rounded-xl font-bold transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-red-200">
            Try Again 🔄
        </a>
        
        <a href="/" class="w-full md:w-auto bg-gray-100 hover:bg-gray-200 text-gray-700 px-10 py-3.5 rounded-xl font-bold transition-all duration-300">
            Back to Home
        </a>
    </div>

    <p class="mt-12 text-sm text-gray-400 gsap-text">
        If the problem persists, please contact our support team.
    </p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof gsap !== 'undefined') {
            // Icon shake and fade in
            gsap.from(".gsap-icon", { 
                scale: 0.5, 
                opacity: 0, 
                duration: 0.8, 
                ease: "elastic.out(1, 0.5)" 
            });

            // Text sliding up
            gsap.from(".gsap-text", { 
                y: 30, 
                opacity: 0, 
                duration: 0.7, 
                delay: 0.3, 
                stagger: 0.2, 
                ease: "power2.out" 
            });

            // Buttons popping in
            gsap.from(".gsap-btn", { 
                y: 20, 
                opacity: 0, 
                duration: 0.6, 
                delay: 0.8, 
                ease: "back.out(1.7)" 
            });
        }
    });
</script>

{% endblock %}
